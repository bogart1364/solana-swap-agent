name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (not a mutable tag like @v4)
      # per this repo's Actions security policy — a tag can be moved to
      # point at different, potentially malicious code later; a commit SHA
      # cannot.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # A placeholder is enough to exercise the build's RPC-URL
          # validation path (see components/WalletProvider.tsx) without
          # needing a real provider key in CI.
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com

      - name: Audit (report only, never blocks CI)
        run: npm audit --audit-level=critical || true
