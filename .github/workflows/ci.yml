name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # A placeholder is enough to exercise the build's RPC-URL
          # validation path (see components/WalletProvider.tsx) without
          # needing a real provider key in CI.
          NEXT_PUBLIC_SOLANA_RPC_URL: https://api.mainnet-beta.solana.com

      - name: Audit (report only, never blocks CI)
        run: npm audit --audit-level=critical || true
